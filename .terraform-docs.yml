version: ">=0.14.0"

formatter: markdown

# header-from: ""
# footer-from: ""

sections:
  hide: []
  show:
    - header
    - footer
    - inputs
    - modules
    - outputs
    - providers
    - requirements
    - resources

content: |-
  {{ .Header }}

  {{ .Requirements }}

  {{ .Providers }}

  {{ .Modules }}

  {{ .Inputs }}

  {{ .Resources }}

  {{ .Outputs }}
  {{ .Footer }}


output:
  file: TF_DOCS.md
  mode: inject
  template: |-
    [//]: # (BEGINNING OF PRE-COMMIT-TERRAFORM DOCS HOOK)

    {{ .Content }}

    [//]: # (END OF PRE-COMMIT-TERRAFORM DOCS HOOK)
output-values:
  enabled: false
  from: ""

sort:
  enabled: false
  by: name

settings:
  anchor: false
  color: true
  default: true
  description: false
  escape: true
  html: false
  indent: 2
  required: true
  sensitive: true
  type: true
